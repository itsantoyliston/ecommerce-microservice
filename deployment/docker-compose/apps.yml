name: 'ecommerce-apps'

services:

  catalog-service:
    image: antonyliston/ecommerce-catalog-service:latest
    container_name: catalog-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://catalog-db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8080"   # host:container
    restart: unless-stopped
    depends_on:
      catalog-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  order-service:
    image: antonyliston/ecommerce-order-service:latest
    container_name: order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker

      # 🔥 IMPORTANT FIX
      ORDERS_CATALOG_SERVICE_URL: http://api-gateway:8989/catalog

      DB_URL: jdbc:postgresql://orders-db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      # 🔥 MATCH INFRA NAME
      RABBITMQ_HOST: ecommerce-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      orders-db:
        condition: service_healthy
      ecommerce-rabbitmq:   # ✅ FIXED
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  notification-service:
    image: antonyliston/ecommerce-notification-service:latest
    container_name: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker

      # 🔥 IMPORTANT FIX
      ORDERS_NOTIFICATION_SERVICE_URL: http://notification-service:8083

      DB_URL: jdbc:postgresql://notifications-db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      # 🔥 MATCH INFRA NAME
      RABBITMQ_HOST: ecommerce-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "8083:8083"
    restart: unless-stopped
    depends_on:
      notifications-db:
        condition: service_healthy
      ecommerce-rabbitmq:   # ✅ FIXED
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 700m

  api-gateway:
    image: antonyliston/ecommerce-api-gateway:latest
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CATALOG_SERVICE_URL=http://catalog-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
    ports:
      - "8989:8989"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m
