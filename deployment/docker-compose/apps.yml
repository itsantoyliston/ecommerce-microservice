name: 'ecommerce-apps'

services:

  catalog-service:
    image: antonyliston/ecommerce-catalog-service:latest
    container_name: catalog-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://catalog-db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8080"   # host:container
    restart: unless-stopped
    depends_on:
      catalog-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  order-service:
    image: antonyliston/ecommerce-order-service:latest
    container_name: order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker

      # 🔥 IMPORTANT FIX
      ORDERS_CATALOG_SERVICE_URL: http://catalog-service:8080

      DB_URL: jdbc:postgresql://orders-db:5432/postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      # 🔥 MATCH INFRA NAME
      RABBITMQ_HOST: ecommerce-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      orders-db:
        condition: service_healthy
      ecommerce-rabbitmq:   # ✅ FIXED
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m